<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EidCard Studio | Digital Greetings</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <h1>🌙 EidCard Studio</h1>
        <p>Create & Share Traditional Eid Greetings</p>
    </header>

    <main class="container">
        <section class="controls">
            <h3>1. Choose Design</h3>
            <div class="template-grid">
                <button onclick="changeTemplate('classic')">Classic BD</button>
                <button onclick="changeTemplate('minimal')">Minimal Gold</button>
                <button onclick="changeTemplate('geometric')">Islamic Green</button>
                <button onclick="changeTemplate('night')">Dreamy Night</button>
            </div>

            <h3>2. Personalize</h3>
            <textarea id="msgInput" placeholder="Write your Eid message here..." oninput="updateCard()"></textarea>
            <input type="text" id="nameInput" placeholder="Your Name" oninput="updateCard()">

            <h3>3. Layout</h3>
            <div class="toggle-group">
                <button onclick="setRatio('square')">Square (Post)</button>
                <button onclick="setRatio('portrait')">Portrait (Story)</button>
            </div>

            <button id="downloadBtn" class="primary-btn">Download Card (PNG)</button>
        </section>

        <section class="preview-section">
            <div id="capture-area" class="card-container square-ratio classic-bg">
                <div class="overlay">
                    <p id="preview-msg">Eid Mubarak! May this day bring joy and peace to your heart.</p>
                    <h2 id="preview-name">- Your Name</h2>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
